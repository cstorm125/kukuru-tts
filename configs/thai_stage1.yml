# Thai Kokoro fine-tune — proven single-GPU recipe.
# Batch 16, flat lr 1e-4: measured stability envelope of this GAN.
# Higher LR diverges (2.8e-4) or NaNs late (1.4e-4); bigger batches on
# more GPUs converge on paper but sound worse (InstanceNorm micro-batch
# statistics). Train on ONE GPU. See docs/THAI_RUNBOOK.md.
batch_size: 16
epochs: 20
epochs_1st: 20
epochs_2nd: 10
save_freq: 2
pretrained_model: "../training/kokoro_base.pth"
first_stage_path: "first_stage.pth"
load_only_params: true
second_stage_load_pretrained: false
# ─────────────────────────────────────────────────────────────────────────────
# Kokoro Thai Fine-Tuning Config (5-tone mapping)
# ─────────────────────────────────────────────────────────────────────────────
# Phoneme format: high tone ˦˥ → ↑ (token 170), rising ˩˩˦ → ↗. Requires:
# - train_list/val_list from scripts/prepare_thai_dataset.py
# - config.json with vocab["↑"]=170 (115 symbols)
# - kokoro_symbols.py with '↑' at index 170
# - FastThaiG2P >= 2db2c26 for inference G2P
# ─────────────────────────────────────────────────────────────────────────────

# ── Logging ──────────────────────────────────────────────────────────────────
log_dir: "logs/thai"

# ── Data ─────────────────────────────────────────────────────────────────────
data_params:
  train_data: "../training/train_list.txt"
  val_data: "../training/val_list.txt"
  root_path: "../training/audio"
  OOD_data: "../training/OOD_texts.txt"
  min_length: 30
  num_workers: 32  # p5.48xlarge has 192 vCPUs; 7 was for the 16-vCPU box

# ── Preprocessing ────────────────────────────────────────────────────────────
preprocess_params:
  sr: 24000
  spect_params:
    n_fft: 2048
    win_length: 1200
    hop_length: 300
    n_mels: 80
    fmin: 0
    fmax: 8000

# ── Model Architecture ──────────────────────────────────────────────────────
# Must match Kokoro-82M exactly to load pre-trained weights
model_params:
  dim_in: 64
  n_token: 178
  hidden_dim: 512
  style_dim: 128
  max_dur: 50
  multispeaker: false
  n_mels: 80
  dropout: 0.2
  n_layer: 3
  text_encoder_kernel_size: 5

  decoder:
    type: istftnet
    upsample_rates: [10, 6]
    upsample_kernel_sizes: [20, 12]
    upsample_initial_channel: 512
    resblock_kernel_sizes: [3, 7, 11]
    resblock_dilation_sizes: [[1, 3, 5], [1, 3, 5], [1, 3, 5]]
    gen_istft_n_fft: 20
    gen_istft_hop_size: 5

  diffusion:
    embedding_mask_proba: 0.1
    transformer:
      num_layers: 3
      num_heads: 8
      head_features: 64
      multiplier: 2
    dist:
      sigma_data: 0.2
      estimate_sigma_data: true
      mean: -3.0
      std: 1.0

  plbert:
    hidden_size: 768
    num_attention_heads: 12
    intermediate_size: 2048
    max_position_embeddings: 512
    num_hidden_layers: 12
    dropout: 0.1

  slm:
    model: "microsoft/wavlm-base-plus"
    sr: 16000
    hidden: 768
    nlayers: 13
    initial_channel: 64

# ── Loss Weights ─────────────────────────────────────────────────────────────
loss_params:
  lambda_gen: 1.0
  lambda_mel: 5.0
  lambda_dur: 1.0
  lambda_ce: 20.0
  lambda_F0: 1.0
  lambda_norm: 1.0
  lambda_s2s: 1.0
  lambda_mono: 1.0
  lambda_slm: 1.0
  lambda_diff: 0.0
  lambda_sty: 0.0
  TMA_epoch: 0
  diff_epoch: 999
  joint_epoch: 5

# ── Optimizer ────────────────────────────────────────────────────────────────
# Flat 1e-4, no warmup (warmup_steps: 0 → factor 1 from step 1).
# Plateau decay stays as the endgame refinement once val mel stalls.
optimizer_params:
  lr: 0.0001
  bert_lr: 0.00001
  ft_lr: 0.0001
  warmup_steps: 0
  grad_clip: 0       # proven recipe runs unclipped; set >0 after any NaN
  lr_decay_factor: 0.5   # halve LR when val mel plateaus...
  lr_patience: 999         # ...for this many consecutive epochs
  min_lr_factor: 0.0625  # floor at peak/16

# ── Early stopping (Stage 1) ─────────────────────────────────────────────────
early_stopping:
  patience: 999       # stop after this many epochs without...
  min_delta: 0.001   # ...val mel improving by at least this much

# ── Pitch Extractor ──────────────────────────────────────────────────────────
F0_path: "Utils/JDC/bst.t7"

# ── ASR Alignment Model ─────────────────────────────────────────────────────
ASR_config: "Utils/ASR/config.yml"
ASR_path: "Utils/ASR/epoch_00080.pth"

# ── PLBERT ───────────────────────────────────────────────────────────────────
PLBERT_dir: "Utils/PLBERT/"

slmadv_params:
  min_len: 100
  max_len: 500
  batch_percentage: 0.5
  iter: 10
  thresh: 5
  scale: 0.01
  sig: 1.5
